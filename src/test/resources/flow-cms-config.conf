application {
  name = "Project Management Application"

  user_management {
    enabled = true
    access_control = {
      roles = ["manager", "admin"]
    }
    registration = true
    additional_table_fields = [{name = "start_date", type = "date"}]
  }

  selects {
    task_status {
      open = {
        en = "Open"
        de = "Offen"
      }
      todo = {
        en = "ToDo"
        de = "Zu erledigen"
      }
      work_in_progress = {
        en = "Work in progress"
        de = "In Arbeit"
      }
      closed = {
        en = "Closed"
        de = "Geschlossen"
      }
    }
  }

  versioning {
    enabled = true
    tables = ["projects", "tasks", "employees", "comments"]
  }

  auditing {
    enabled = true
    actions = ["create", "update", "delete", "login", "logout"]
  }

  tables = {
    "projects" = {
      fields = {
        id = {type = "id", primary = true},
        name = {type = "text", required = true, max_length = 255},
        description = {type = "text", max_length = 500},
        start_date = {type = "date"},
        end_date = {type = "date"},
        created_at = {type = "datetime"},
        updated_at = {type = "datetime"}
      }
    },
    "tasks" = {
      fields = {
        id = {type = "id", primary = true},
        title = {type = "text", required = true, max_length = 255},
        description = {type = "text", max_length = 1000},
        assigned_to = {type = "number"},
        status = {type = "select", values = "task_status"},
        due_date = {type = "date", read_only_for_roles = ["developer"]},
        created_at = {type = "datetime"},
        updated_at = {type = "datetime"}
      }
    },
    "comments" = {
      fields = {
        id = {type = "id", primary = true},
        comment_text = {type = "text", max_length = 1000},
        employee_id = {type = "number"},
        created_at = {type = "datetime", default = "now()"}
      }
    }
    #"images" = {
    #  id = {type = "id", primary = true},
    #  title = {type = "image", required = true},
    #}
  }
  routes = {
    "projects" = {
      is_default = true
      table = "projects"
      title = {
        en = "Projects"
        de = "Projekte"
      }
      renderer = "item"
      render_configuration {
        inline_edit = true
        item_renderer = {
          type = "entity_item_card_renderer"
          title_field = "name"
          description_field = "description"
        }
        detail_renderer {
          type = "form_detail_renderer", children = [
            {field = "title"},
            {field = "description"},
            {field = "status"},
            {field = "due_date"}
          ]
        }
        access_control = {
          roles = ["manager", "admin"]
        }
      }
    },
    "tasks" = {
      table = "tasks"
      title = {
        en = "Tasks"
        de = "Aufgaben"
      }
      renderer = "master_detail"
      render_configuration = {
        item_renderer = {
          type = "entity_item_card_renderer"
          title_field = "name"
          description_field = "description"
        }
        detail_renderer {
          type = "form_detail_renderer", children = [
            {field = "title"},
            {field = "description"},
            {field = "status"},
            {field = "due_date"}
            #{type = "relationship", read_only=true }
          ]
        }
      }
      access_control = {
        roles = ["developer", "manager", "admin"]
      }
    }
  }
}