application {
  name = "Project Management Application"

  user_management {
    enabled = true
    access_control = {
      roles = ["manager", "admin"]
    }
    registration = true
    additional_collection_fields = [{name = "start_date", type = "date"}]
  }

  selects {
    task_status {
      open = {
        en = "Open"
        de = "Offen"
      }
      todo = {
        en = "ToDo"
        de = "Zu erledigen"
      }
      work_in_progress = {
        en = "Work in progress"
        de = "In Arbeit"
      }
      closed = {
        en = "Closed"
        de = "Geschlossen"
      }
    }
  }

  versioning {
    enabled = true
    collections = ["projects", "tasks", "employees", "comments"]
  }

  auditing {
    enabled = true
    actions = ["create", "update", "delete", "login", "logout"]
  }

  collections = {
    "projects" = {
      fields = {
        id = {type = "id", primary = true},
        name = {type = "text", required = true, max_length = 255},
        description = {type = "text", max_length = 500},
        start_date = {type = "date"},
        end_date = {type = "date"},
        created_at = {type = "datetime", default = "now()"},
        updated_at = {type = "datetime", default = "now()"}
      }
    },
    "tasks" = {
      fields = {
        id = {type = "id", primary = true},
        title = {type = "text", required = true, max_length = 255},
        description = {type = "text", max_length = 1000},
        assigned_to = {type = "number"},
        status = {type = "task_status"},
        due_date = {type = "date"},
        created_at = {type = "datetime", default = "now()"},
        updated_at = {type = "datetime", default = "now()"}
      }
    },
    "comments" = {
      fields = {
        id = {type = "id", primary = true},
        comment_text = {type = "text", max_length = 1000},
        employee_id = {type = "number"},
        created_at = {type = "datetime", default = "now()"}
      }
    }
  }
  views = {
    "project_view" = {
      collection = "projects"
      layout = [
        {component = "text", field = "name"},
        {component = "textarea", field = "description"},
        {component = "date", field = "start_date"},
        {component = "date", field = "end_date"}
      ]
      access_control = {
        roles = ["manager", "admin"]
      }
    },
    "task_view" = {
      collection = "tasks"
      layout = [
        {
          component = "form", children = [
          {component = "text", field = "title"},
          {component = "textarea", field = "description"},
          {component = "dropdown", field = "status", options = ["open", "in progress", "completed"]},
          {component = "date", field = "due_date"}
        ]
        }
      ]
      access_control = {
        roles = ["developer", "manager", "admin"]
      }
      field_access_control = [
        {
          field = "status",
          read_only_for_roles = ["developer"]
        }
      ]
    }
  }

  relationships = {
    projects = {
      project_id = {
        target_collection = "users"
        relation_type = "one_to_many"
      }
    }
    tasks = {
      assigned_to = {
        target_collection = "users"
        relation_type = "many_to_one"
      }
      task_id = {
        target_collection = "comments"
        relation_type = "one_to_many"
      }
    }
    comments = {
      employee_id = {
        target_collection = "users"
        relation_type = "many_to_one"
      }
    }
  }
}