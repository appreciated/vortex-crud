application {
  name = "Project Management Application"

  user_management {
    enabled = true
    access_control = {
      roles = ["manager", "admin"]
    }
  }

  versioning {
    enabled = true
    collections = ["projects", "tasks", "employees", "comments"]
  }

  auditing {
    enabled = true
    actions = ["create", "update", "delete", "login", "logout"]
  }

  collections = [
    {
      name = "projects"
      fields = [
        {name = "id", type = "id", primary = true},
        {name = "name", type = "text", required = true, max_length = 255},
        {name = "description", type = "text", max_length = 500},
        {name = "start_date", type = "date"},
        {name = "end_date", type = "date"},
        {name = "created_at", type = "datetime", default = "now()"},
        {name = "updated_at", type = "datetime", default = "now()"}
      ]
    },
    {
      name = "tasks"
      fields = [
        {name = "id", type = "id", primary = true},
        {name = "title", type = "text", required = true, max_length = 255},
        {name = "description", type = "text", max_length = 1000},
        {name = "assigned_to", type = "number"},
        {name = "status", type = "text", default = "open", max_length = 50},
        {name = "due_date", type = "date"},
        {name = "created_at", type = "datetime", default = "now()"},
        {name = "updated_at", type = "datetime", default = "now()"}
      ]
    },
    {
      name = "employees"
      fields = [
        {name = "id", type = "id", primary = true},
        {name = "username", type = "text", unique = true, required = true, max_length = 255},
        {name = "password_hash", type = "text", required = true, max_length = 255},
        {name = "email", type = "text", unique = true, required = true, max_length = 255},
        {name = "role_id", type = "number"},
        {name = "created_at", type = "datetime", default = "now()"}
      ]
    },
    {
      name = "roles"
      fields = [
        {name = "id", type = "id", primary = true},
        {name = "name", type = "text", unique = true, required = true, max_length = 50}
      ]
    },
    {
      name = "comments"
      fields = [
        {name = "id", type = "id", primary = true},
        {name = "comment_text", type = "text", max_length = 1000},
        {name = "employee_id", type = "number"},
        {name = "created_at", type = "datetime", default = "now()"}
      ]
    }
  ]

  views = [
    {
      name = "project_view"
      collection = "projects"
      layout = [
        {component = "text", field = "name"},
        {component = "textarea", field = "description"},
        {component = "date", field = "start_date"},
        {component = "date", field = "end_date"}
      ]
      access_control = {
        roles = ["manager", "admin"]  # Nur Manager und Admins können Projekte ansehen und bearbeiten
      }
    },
    {
      name = "task_view"
      collection = "tasks"
      layout = [
        {component = "text", field = "title"},
        {component = "textarea", field = "description"},
        {component = "dropdown", field = "status", options = ["open", "in progress", "completed"]},
        {component = "date", field = "due_date"}
      ]
      access_control = {
        roles = ["developer", "manager", "admin"]
      }
      field_access_control = [
        {
          field = "status",
          read_only_for_roles = ["developer"]
        }
      ]
    }
  ]

  relationships = {
    projects = {
      project_id = {
        target_collection = "users"
        relation_type = "one-to-many"
      }
    }
    tasks = {
      assigned_to = {
        target_collection = "users"
        relation_type = "many-to-one"
      }
      task_id = {
        target_collection = "comments"
        relation_type = "one-to-many"
      }
    }
    comments = {
      employee_id = {
        target_collection = "users"
        relation_type = "many-to-one"
      }
    }
  }
}