application {
  name: "application.name"

  i18n-bundle-prefix: "some_i18n"

  user-management {
    enabled: true
    access-control {
      roles: ["manager", "admin"]
    }
    sign-up: true
    additional-fields: [{name: "start_date", type: "date"}]
  }

  selects {
    task-status {
      open: "selects.task-status.open"
      todo: "selects.task-status.todo"
      work-in-progress: "selects.task-status.progress"
      closed: "selects.task-status.closed"
    }
  }

  versioning {
    enabled: true
    repositories: ["projects", "tasks", "task_comments"]
  }

  auditing {
    enabled: true
    actions: ["create", "update", "delete", "login", "logout"]
  }

  repositories {
    "projects" {
      fields {
        id {factory: "id", primary: true},
        name {factory: "text", required: true, validation {max-length: 255}},
        description {factory: "textarea", validation {max-length: 500}},
        start_date {factory: "date"},
        end_date {factory: "date"},
        created_at {factory: "datetime"},
        updated_at {factory: "datetime"}
      }
    },
    "tasks" {
      fields {
        id {factory: "id", primary: true},
        title {factory: "text", required: true, validation {max-length: 255}},
        description {factory: "textarea", validation {max-length: 1000}},
        assigned_to {factory: "reference", repository: "users", field: "id", filter-field: "username", children: ["username"]},  # 1:1 Relation
        status {factory: "select", values: "task-status"},
        due_date {factory: "date", read-only-for-roles: ["developer"]},
        created_at {factory: "datetime"},
        updated_at {factory: "datetime"}
      }
    },
    "task_has_task" {
      fields {
        task_id {factory: "id"},
        related_task_id {factory: "id"},
      }
    }
    "task_comments" {
      fields {
        id {factory: "id", primary: true},
        comment_text {factory: "textarea", validation {max-length: 1000}},
        user_id {factory: "number"},
        created_at {factory: "datetime", default: "now()"}
      }
    }
    "images" {
      fields {
        id {factory: "id", primary: true},
        title {factory: "text", required: true, validation {max-length: 255}},
        url {factory: "image", required: true, configuration {factory: "default"}},
      }
    }
  }

  forms {
    task: {
      repository: "tasks"
      factory: "form"
      configuration {
        title-field: "title"
        children: [
          {type: "field", field: "title", label: "route.tasks.labels.title"},
          {type: "field", field: "description", label: "route.tasks.labels.description"},
          {type: "field", field: "status", label: "route.tasks.labels.status"},
          {type: "field", field: "due_date", label: "route.tasks.labels.due_date"},
          {type: "field", field: "assigned_to", label: "route.tasks.labels.assigned_to"}, # 1:1 Relation
          {
            type: "collection"  # One-To-Many Relation
            label: "route.tasks.labels.comments"
            factory: "list"
            configuration {
              data {
                repository: "task_comments"
                one-to-many {
                  reference-field: "task_id"
                }
                children: [
                  "comment_text"
                ]
              }
              factory: "form"
              empty-message: "route.tasks.labels.comments-empty-message"
              child {
                factory: "form"
                configuration {
                  title-field: "name"
                  children: [
                    {type: "field", field: "comment_text", label: "route.tasks.labels.comment"}
                  ]
                }
              }
            }
          }
          {
            type: "collection"  # Many-To-Many Relation
            factory: "list"
            label: "route.tasks.labels.related-tasks"
            configuration {
              data {
                repository: "tasks"
                many-to-many {
                  associative-repository: "task_has_task"
                  associative-source-id-field: "task_id"
                  associative-target-id-field: "related_task_id"
                  repository-field: "task_id"
                }
                children: [
                  "comment_text"
                ]
              }
              empty-message: "route.tasks.labels.related-tasks-empty-message"
              factory: "connect"
              child {
                factory: "form"
                configuration {
                  title-field: "name"
                  children: [
                    {type: "field", field: "comment_text", label: "route.tasks.labels.comment"}
                  ]
                }
              }
            }
          }
        ]
      }
    }
    project: {
      repository: "projects"
      factory: "form"
      title: "route.projects.title-cards"
      configuration {
        title-field: "name"
        children: [
          {type: "field", field: "name", label: "route.projects.labels.name"},
          {type: "field", field: "description", label: "route.projects.labels.description"},
          {type: "field", field: "start_date", label: "route.projects.labels.start_date"},
          {type: "field", field: "end_date", label: "route.projects.labels.end_date"}
        ]
      }
    }
    image: {
      repository: "images"
      factory: "form"
      title: "route.projects.title-cards"
      configuration {
        title-field: "title"
        children: [
          {type: "field", field: "title", label: "route.images.labels.title"},
          {type: "field", field: "url", label: "route.images.labels.image"},
        ]
      }
    }
  }

  routes {
    "projects-cards" {
      default-route: true
      factory: "grid"
      repository: "projects"
      icon: "FACTORY"
      title: "route.projects.title-cards"
      configuration {
        factory: "card"
        title-field: "name"
        description-field: "description"
      }
      roles: ["manager", "admin"]
      child: ${application.forms.project}
    }
    "projects-list" {
      factory: "list"
      repository: "projects"
      icon: "FACTORY"
      title: "route.projects.title-list"
      configuration {
        factory: "default"
        inline-edit: true
        filter-field: "name"
        children: [
          {type: "field", field: "name", label: "route.projects.labels.name"},
          {type: "field", field: "description", label: "route.projects.labels.description"},
          {type: "field", field: "start_date", label: "route.projects.labels.start_date"},
          {type: "field", field: "end_date", label: "route.projects.labels.end_date"},
        ]
      }
      roles: ["manager", "admin"]
      child: ${application.forms.project}
    }
    "tasks" {
      icon: "TASKS"
      repository: "tasks"
      title: "route.tasks.title"
      factory: "submenu"
      children {
        "open" {
          icon: "TASKS"
          repository: "tasks"
          title: "route.open-tasks.title"
          factory: "kanban"
          configuration {
            factory: "card"
            title-field: "title"
            description-field: "description"
            column-field: "status"
          }
          child: ${application.forms.task}
        }
        "done" {
          icon: "CHECK_CIRCLE"
          repository: "tasks"
          title: "route.done-tasks.title"
          factory: "master-detail"
          configuration {
            factory: "card"
            title-field: "title"
            description-field: "description"
          }
          child: ${application.forms.task}
        }
      }
    }
    "images-grid" {
      factory: "grid"
      repository: "images"
      icon: "CAMERA"
      title: "route.images-cards"
      configuration {
        factory: "card"
        title-field: "title"
        image-field: "url"
        image-factory: "default"
      }
      roles: ["manager", "admin"]
      child: ${application.forms.image}
    }
    "images-list" {
      factory: "list"
      repository: "images"
      icon: "CAMERA"
      title: "route.images-list"
      configuration {
        factory: "default"
        inline-edit: true
        filter-field: "title"
        children: [
          {type: "field", field: "url", label: "route.projects.labels.description"},
          {type: "field", field: "title", label: "route.projects.labels.name"},
        ]
      }
      roles: ["manager", "admin"]
      child: ${application.forms.image}
    }
  }
}