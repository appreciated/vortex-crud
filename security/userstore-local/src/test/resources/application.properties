# Security integration tests use mocked data stores - no real database needed
# Disable all database-related auto-configurations
spring.autoconfigure.exclude=\
  com.github.appreciated.vortex_crud.jooq.service.config.JooqVortexCrudAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.liquibase.LiquibaseAutoConfiguration
logging.level.org.atmosphere.cpr.AtmosphereFramework=OFF
