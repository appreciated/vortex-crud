spring.datasource.url=jdbc:sqlite::memory:
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.liquibase.enabled=false
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.atmosphere=OFF
logging.level.org.apache.catalina.core=OFF
logging.level.com.zaxxer.hikari=OFF
logging.level.com.vaadin.flow.server=OFF
logging.level.org.jooq.Constants=OFF
logging.level.org.springframework.boot.tomcat=OFF
logging.level.org.springframework.web.servlet=OFF
logging.level.org.springframework.boot.web.context.servlet=OFF
logging.level.org.hibernate.orm.connections.pooling=OFF
spring.main.banner-mode=off