# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Get Playwright version
        id: playwright-version
        run: |
          PLAYWRIGHT_VERSION=$(grep -A 3 'com.microsoft.playwright' ui-test-base/pom.xml | grep '<version>' | head -1 | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | tr -d '[:space:]')
          echo "version=$PLAYWRIGHT_VERSION" >> $GITHUB_OUTPUT
          echo "Playwright version: $PLAYWRIGHT_VERSION"
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - name: Cache Playwright system dependencies
        uses: actions/cache@v4
        id: apt-cache
        with:
          path: playwright-apt-archives
          key: playwright-deps-${{ runner.os }}-${{ hashFiles('ui-test-base/pom.xml') }}
          restore-keys: |
            playwright-deps-${{ runner.os }}-
      - name: Restore Apt archives
        run: |
          sudo mkdir -p /var/cache/apt/archives
          if [ -d "playwright-apt-archives" ]; then
            echo "Restoring apt cache..."
            sudo cp -rn playwright-apt-archives/. /var/cache/apt/archives/
          fi
      - name: Install Playwright browsers and dependencies
        run: |
            mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install-deps" --no-transfer-progress -B -pl ui-test-base
            mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install" --no-transfer-progress -B -pl ui-test-base
      - name: Save Apt archives
        if: always()
        run: |
          echo "Saving apt cache..."
          rm -rf playwright-apt-archives
          mkdir -p playwright-apt-archives
          sudo cp -r /var/cache/apt/archives/*.deb playwright-apt-archives/ || true
          sudo rm -f playwright-apt-archives/lock
          sudo rm -rf playwright-apt-archives/partial
      - name: Build with Maven
        run: mvn --no-transfer-progress -B package --file pom.xml
      - name: Upload Playwright Traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            ui-test-base/target/traces/*.zip
            jooq/target/traces/*.zip
            jpa/target/traces/*.zip
          if-no-files-found: ignore